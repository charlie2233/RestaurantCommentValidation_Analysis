name: CI

on:
  push:
    branches: ["main", "copilot/**", "codex/**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Verify
        run: make verify

      - name: CLI help smoke test
        run: |
          python -m qsr_audit.cli --help
          python -m qsr_audit.cli ingest-workbook --help
          python -m qsr_audit.cli validate-workbook --help
          python -m qsr_audit.cli run-syntheticness --help
          python -m qsr_audit.cli reconcile --help
          python -m qsr_audit.cli report --help
